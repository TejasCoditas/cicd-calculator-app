name: Release (tag)

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semantic bump (prod from latest vX.Y.Z; non-prod from latest vX.Y.Z-<env>)
        type: choice
        required: true
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  branch-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce dispatch branch
        run: |
          set -euo pipefail
          case "${GITHUB_REF}" in
            refs/heads/main|refs/heads/dev|refs/heads/qa|refs/heads/uat) ;;
            *) echo "Run only from main, dev, qa, or uat"; exit 1 ;;
          esac

  tag-production:
    needs: branch-guard
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: release-prod
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Production tag
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail

          git fetch --tags --force origin

          latest_prod="$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1 || true)"
          if [ -z "${latest_prod}" ]; then
            major=0; minor=0; patch=0
          else
            ver="${latest_prod#v}"
            major="${ver%%.*}"
            rest="${ver#*.}"
            minor="${rest%%.*}"
            patch="${rest#*.}"
          fi

          case "${BUMP}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
            *) echo "Invalid bump"; exit 1 ;;
          esac

          new_tag="v${major}.${minor}.${patch}"

          if git rev-parse -q --verify "refs/tags/${new_tag}" >/dev/null 2>&1; then
            echo "Tag ${new_tag} already exists locally"; exit 1
          fi
          if git ls-remote --tags origin "refs/tags/${new_tag}" | grep -q .; then
            echo "Tag ${new_tag} already exists on remote"; exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "${new_tag}" -m "Production release ${new_tag}"
          git push origin "refs/tags/${new_tag}"

          echo "Created and pushed ${new_tag}"

  tag-nonprod:
    needs: branch-guard
    if: |
      github.ref == 'refs/heads/dev' ||
      github.ref == 'refs/heads/qa' ||
      github.ref == 'refs/heads/uat'
    runs-on: ubuntu-latest
    concurrency:
      group: release-nonprod-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Environment suffix
        id: meta
        run: |
          set -euo pipefail
          case "${GITHUB_REF}" in
            refs/heads/dev) suffix=dev ;;
            refs/heads/qa) suffix=qa ;;
            refs/heads/uat) suffix=uat ;;
            *) echo "Unsupported branch"; exit 1 ;;
          esac
          echo "suffix=${suffix}" >> "${GITHUB_OUTPUT}"

      - name: Non-production tag
        env:
          SUFFIX: ${{ steps.meta.outputs.suffix }}
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail

          git fetch --tags --force origin

          pattern="^v[0-9]+\\.[0-9]+\\.[0-9]+-${SUFFIX}$"
          latest_env="$(git tag -l 'v*' | grep -E "${pattern}" | sort -V | tail -n1 || true)"

          if [ -z "${latest_env}" ]; then
            major=0; minor=0; patch=0
          else
            base="${latest_env%-${SUFFIX}}"
            base="${base#v}"
            major="${base%%.*}"
            rest="${base#*.}"
            minor="${rest%%.*}"
            patch="${rest#*.}"
          fi

          case "${BUMP}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
            *) echo "Invalid bump"; exit 1 ;;
          esac

          new_tag="v${major}.${minor}.${patch}-${SUFFIX}"

          if git rev-parse -q --verify "refs/tags/${new_tag}" >/dev/null 2>&1; then
            echo "Tag ${new_tag} already exists locally"; exit 1
          fi
          if git ls-remote --tags origin "refs/tags/${new_tag}" | grep -q .; then
            echo "Tag ${new_tag} already exists on remote"; exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "${new_tag}" -m "Non-production release ${new_tag}"
          git push origin "refs/tags/${new_tag}"

          echo "Created and pushed ${new_tag}"

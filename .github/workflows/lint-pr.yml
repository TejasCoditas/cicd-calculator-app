name: Lint PR title

run-name: Lint PR title — ${{ github.event.pull_request.title }}

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - edited
      - synchronize
      - reopened

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  pull-requests: read

jobs:
  lint:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed conventional commit types
          types: |
            feat
            fix
            chore
            docs
            style
            refactor
            perf
            test
            build
            ci
            revert
            release
            hotfix
            feature
            improvement
            security
            upgrade
            tweak
          # Allow breaking change indicator (e.g. feat!: ...)
          requireScope: false
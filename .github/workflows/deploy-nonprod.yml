name: Deploy (non-production)

run-name: Deploy ${{ github.ref_name }}

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-nonprod-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify branch
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if deploy should run
        id: check
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ "${GITHUB_REF}" != refs/tags/* ]]; then
              echo "::warning::Run this workflow from a tag ref (vMAJOR.MINOR.PATCH), not a branch. Got: ${GITHUB_REF_NAME}"
              echo "should_deploy=false" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          fi

          tag="${GITHUB_REF_NAME}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::warning::Non-production tag must be vMAJOR.MINOR.PATCH (digits only, e.g. v1.0.0). Got: ${tag}"
            echo "should_deploy=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git fetch origin dev
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/dev"; then
            echo "::warning::Tag ${tag} does not point to a commit on origin/dev — skipping deployment."
            echo "should_deploy=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "should_deploy=true" >> "${GITHUB_OUTPUT}"

  deploy:
    needs: verify
    if: needs.verify.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Deploy
        run: |
          set -euo pipefail
          echo "Add non-production deploy steps for ${GITHUB_REF_NAME}"
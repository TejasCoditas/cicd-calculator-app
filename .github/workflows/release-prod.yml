name: Release (production tag)

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semantic bump from latest production tag
        type: choice
        required: true
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release-prod
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Compute version and create annotated tag
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail

          git fetch --tags --force origin

          latest_prod="$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1 || true)"
          if [ -z "${latest_prod}" ]; then
            major=0; minor=0; patch=0
          else
            ver="${latest_prod#v}"
            major="${ver%%.*}"
            rest="${ver#*.}"
            minor="${rest%%.*}"
            patch="${rest#*.}"
          fi

          case "${BUMP}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
            *) echo "Invalid bump"; exit 1 ;;
          esac

          new_tag="v${major}.${minor}.${patch}"

          if git rev-parse -q --verify "refs/tags/${new_tag}" >/dev/null 2>&1; then
            echo "Tag ${new_tag} already exists locally"; exit 1
          fi
          if git ls-remote --tags origin "refs/tags/${new_tag}" | grep -q .; then
            echo "Tag ${new_tag} already exists on remote"; exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "${new_tag}" -m "Production release ${new_tag}"
          git push origin "refs/tags/${new_tag}"

          echo "Created and pushed ${new_tag}"

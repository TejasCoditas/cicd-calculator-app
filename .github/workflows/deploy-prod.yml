name: Deploy (production)

run-name: Deploy prod ${{ github.ref_name }}

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-prod-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Require tag ref
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != refs/tags/* ]]; then
            echo "Choose a version tag in Run workflow (ref selector), not a branch."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate production tag
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"

          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Production deploy requires vX.Y.Z (no suffix); got: ${tag}"; exit 1
          fi

          git fetch --tags --force origin

          if ! git ls-remote --tags origin "refs/tags/${tag}" | grep -q .; then
            echo "Tag does not exist: ${tag}"; exit 1
          fi
          git fetch origin tag "${tag}"

          sha="$(git rev-parse "refs/tags/${tag}^{commit}")"

          git fetch origin main

          if ! git merge-base --is-ancestor "${sha}" origin/main; then
            echo "Tagged commit ${sha} is not on origin/main"; exit 1
          fi

          echo "OK: ${tag} @ ${sha}"

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Deploy
        run: |
          set -euo pipefail
          echo "Add production deploy steps for ${GITHUB_REF_NAME}"

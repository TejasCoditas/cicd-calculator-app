name: Deploy (production)

run-name: Deploy prod ${{ inputs.version || 'latest' }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to deploy (e.g. v1.2.3). Leave blank to deploy the latest tag."
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  verify:
    name: Verify tag
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
      deploy_tag: ${{ steps.check.outputs.deploy_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve and verify tag
        id: check
        run: |
          set -euo pipefail

          git fetch origin --tags

          if [[ -n "${{ inputs.version }}" ]]; then
            tag="${{ inputs.version }}"
            if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::warning::Provided version must be vMAJOR.MINOR.PATCH (e.g. v1.2.3). Got: ${tag}"
              echo "should_deploy=false" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
            if ! git tag -l "${tag}" | grep -q .; then
              echo "::warning::Tag ${tag} does not exist in the repository."
              echo "should_deploy=false" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          else
            tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -1)"
            if [[ -z "${tag}" ]]; then
              echo "::warning::No vMAJOR.MINOR.PATCH tags found in the repository."
              echo "should_deploy=false" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
            echo "::notice::No version specified — resolved latest tag: ${tag}"
          fi

          echo "should_deploy=true" >> "${GITHUB_OUTPUT}"
          echo "deploy_tag=${tag}" >> "${GITHUB_OUTPUT}"

  deploy:
    needs: verify
    if: needs.verify.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.verify.outputs.deploy_tag }}
          fetch-depth: 0

      - name: Deploy
        env:
          DEPLOY_TAG: ${{ needs.verify.outputs.deploy_tag }}
        run: |
          set -euo pipefail
          echo "Add production deploy steps for ${DEPLOY_TAG}"
name: Deploy (tag)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag (e.g. v1.2.3, v1.2.3-dev)'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.event.inputs.tag }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag and target branch
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          tag="${TAG#refs/tags/}"
          tag="${tag#tags/}"

          if [[ "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            branch=main
          elif [[ "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-(dev|qa|uat)$ ]]; then
            branch="${BASH_REMATCH[1]}"
          else
            echo "Invalid tag format: ${tag}"; exit 1
          fi

          git fetch --tags --force origin

          if ! git ls-remote --tags origin "refs/tags/${tag}" | grep -q .; then
            echo "Tag does not exist: ${tag}"; exit 1
          fi
          git fetch origin tag "${tag}"

          sha="$(git rev-parse "refs/tags/${tag}^{commit}")"

          git fetch origin "${branch}"

          if ! git merge-base --is-ancestor "${sha}" "origin/${branch}"; then
            echo "Tagged commit ${sha} is not on origin/${branch}"; exit 1
          fi

          echo "OK: ${tag} -> ${branch} @ ${sha}"

      - name: Placeholder deploy
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          echo "Add deploy steps here for ${TAG}"
